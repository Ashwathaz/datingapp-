apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: soulsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-05-10T01-41-38Z
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: minio-secrets
          ports:
            - containerPort: 9000
            - containerPort: 9001

