apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soulsync
  namespace: soulsync
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.soulsync.example
        - admin.soulsync.example
      secretName: soulsync-tls
  rules:
    - host: api.soulsync.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
    - host: admin.soulsync.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 80

