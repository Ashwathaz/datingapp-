apiVersion: v1
kind: Secret
metadata:
  name: soulsync-secrets
  namespace: soulsync
type: Opaque
stringData:
  NODE_ENV: production
  API_PORT: "3000"
  DATABASE_URL: postgresql://soulsync:replace-me@postgres:5432/soulsync
  REDIS_URL: redis://redis:6379
  RABBITMQ_URL: amqp://soulsync:replace-me@rabbitmq:5672
  ELASTICSEARCH_URL: http://elasticsearch:9200
  AI_SERVICE_URL: http://ai-service:8000
  JWT_ACCESS_SECRET: replace-me
  JWT_REFRESH_SECRET: replace-me
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_ACCESS_KEY: replace-me
  MINIO_SECRET_KEY: replace-me
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: soulsync
type: Opaque
stringData:
  POSTGRES_USER: soulsync
  POSTGRES_PASSWORD: replace-me
  POSTGRES_DB: soulsync
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secrets
  namespace: soulsync
type: Opaque
stringData:
  MINIO_ROOT_USER: soulsync
  MINIO_ROOT_PASSWORD: replace-me

