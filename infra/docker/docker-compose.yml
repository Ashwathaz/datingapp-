services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soulsync
      POSTGRES_PASSWORD: soulsync
      POSTGRES_DB: soulsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulsync -d soulsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: soulsync
      RABBITMQ_DEFAULT_PASS: soulsync
    ports:
      - "5672:5672"
      - "15672:15672"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: soulsync
      MINIO_ROOT_PASSWORD: soulsync-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ai-service:
    build:
      context: ../../apps/ai-service
    environment:
      AI_MODE: local
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../apps/backend
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://soulsync:soulsync@postgres:5432/soulsync
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://soulsync:soulsync@rabbitmq:5672
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  admin:
    build:
      context: ../../apps/admin
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ../k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"

volumes:
  postgres_data:
  redis_data:
  elastic_data:
  minio_data:
  grafana_data:

