apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai-service
spec:
  replicas: {{ .Values.aiService.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ai-service
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ai-service
    spec:
      containers:
        - name: ai-service
          image: {{ .Values.aiService.image }}
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ai-service
spec:
  selector:
    app: {{ .Release.Name }}-ai-service
  ports:
    - port: 8000
      targetPort: 8000

